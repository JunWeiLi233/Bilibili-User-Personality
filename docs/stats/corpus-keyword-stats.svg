<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Bilibili User Personality data collection and keyword analysis stats</title>
  <desc id="desc">Current counts for collected comments, danmaku, analyzed dictionary keywords, and coverage metrics.</desc>
  <style>
    .bg { fill: #f7f0df; }
    .panel { fill: #fffaf0; stroke: #27231c; stroke-width: 2; }
    .title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #27231c; }
    .sub { font: 14px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #6c6355; }
    .label { font: 700 18px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #27231c; }
    .value { font: 700 18px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #27231c; text-anchor: start; }
    .small { font: 13px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #5d5548; }
    .metric { font: 700 26px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #27231c; }
    .tile-label { font: 700 15px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #6c6355; }
    .tile-value { font: 700 34px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #27231c; }
    .stat-icon { font: 18px sans-serif; }
    .stat-num { font: 700 16px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #27231c; }
    .stat-label { font: 13px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #6c6355; }
  </style>
  <rect class="bg" width="920" height="430" rx="24"/>
  <rect class="panel" x="18" y="18" width="884" height="394" rx="20"/>
  <text x="40" y="62" class="title">Corpus Collection + Keyword Analysis</text>
  <text x="40" y="88" class="sub">auto-generated from repo data on 2026-07-07</text>
  <!-- Three centered columns: coverage donut | weak terms | evidence deficit (all centered on y=212) -->
  <g>
    <circle cx="160" cy="212" r="78" fill="none" stroke="#e8e1d2" stroke-width="24"/>
    <circle cx="160" cy="212" r="78" fill="none" stroke="#3f7558" stroke-width="24"
      stroke-dasharray="387.2 102.9" stroke-linecap="round"
      transform="rotate(-90 160 212)"/>
    <text x="160" y="206" text-anchor="middle" class="metric" font-size="26">79.00%</text>
    <text x="160" y="230" text-anchor="middle" class="small">coverage</text>
  </g>
  <g>
    <rect x="350" y="142" width="220" height="140" rx="16" fill="#eadfca" stroke="#27231c"/>
    <text x="460" y="178" text-anchor="middle" class="tile-label">weak terms</text>
    <text x="460" y="224" text-anchor="middle" class="tile-value">659</text>
    <text x="460" y="256" text-anchor="middle" class="small">&#8595; target: 0</text>
  </g>
  <g>
    <rect x="650" y="142" width="220" height="140" rx="16" fill="#dbe8df" stroke="#27231c"/>
    <text x="760" y="178" text-anchor="middle" class="tile-label">evidence deficit</text>
    <text x="760" y="224" text-anchor="middle" class="tile-value">1,814</text>
    <text x="760" y="256" text-anchor="middle" class="small">gap to close</text>
  </g>
  <!-- Stat strip aligned to the same three columns, full-width symmetric -->
  <g>
    <line x1="40" y1="310" x2="880" y2="310" stroke="#d7ccb8" stroke-width="1"/>
    <text x="160" y="346" text-anchor="middle" class="stat-icon">&#128172;</text>
    <text x="160" y="372" text-anchor="middle" class="stat-num">25,713</text>
    <text x="160" y="390" text-anchor="middle" class="stat-label">comments / replies</text>
    <text x="460" y="346" text-anchor="middle" class="stat-icon">&#127916;</text>
    <text x="460" y="372" text-anchor="middle" class="stat-num">153,875</text>
    <text x="460" y="390" text-anchor="middle" class="stat-label">danmaku</text>
    <text x="760" y="346" text-anchor="middle" class="stat-icon">&#128218;</text>
    <text x="760" y="372" text-anchor="middle" class="stat-num">2,647</text>
    <text x="760" y="390" text-anchor="middle" class="stat-label">keyword terms</text>
  </g>
</svg>
