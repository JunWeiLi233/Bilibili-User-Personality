# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: DevSkim

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '45 22 * * 6'

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # Exclude generated/non-source paths so the SARIF stays small enough
          # for GitHub's code-scanning ingest (large SARIFs time out on upload).
          ignore-globs: "**/.git/**,**/bin/**,server/data/**,node_modules/**,**/__pycache__/**"

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif
          # Don't block the step waiting for GitHub to finish backend processing —
          # large SARIFs routinely take >60s and cause the "couldn't respond in
          # time" timeout. Processing still happens asynchronously.
          wait-for-processing: false
