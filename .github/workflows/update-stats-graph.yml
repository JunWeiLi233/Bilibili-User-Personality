name: Update README Stats Graph

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Generate stats graph
        run: npm run stats:update

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Refresh README stats graph
          file_pattern: README.md docs/stats/corpus-keyword-stats.svg docs/stats/corpus-keyword-stats.json docs/stats/corpus-growth-timeline.svg docs/stats/corpus-growth-timeline.json
