name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you'd like to see and why.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Is it related to a frustration or limitation?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
      placeholder: A clear description of the feature or change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you thought about?
      placeholder: Describe any alternative solutions or workarounds.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the project does this affect?
      options:
        - Frontend (React/Vite UI)
        - Backend API (Hono server)
        - Python utilities / CLI
        - Dictionary / keyword system
        - Scraper / crawler
        - Documentation
        - CI / DevOps
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: This feature fits the project's research scope (Bilibili comment analysis, not general-purpose tooling)
          required: true
        - label: I have searched existing issues and discussions to avoid duplicates
          required: true
